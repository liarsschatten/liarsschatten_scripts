services:
  db:
    image: dhi.io/mysql:8.4
    command: mysqld
    environment:
      MYSQL_ROOT_PASSWORD: 1234
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootsecret"]
      interval: 2s
      timeout: 3s
      retries: 30

  db-init:
    image: dhi.io/mysql:8.4
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "mysql -h db -uroot -prootsecret <<EOF
        CREATE DATABASE IF NOT EXISTS wordpress;
        CREATE USER IF NOT EXISTS 'wordpress'@'%' IDENTIFIED BY 'changeme';
        GRANT ALL PRIVILEGES ON wordpress.* TO 'wordpress'@'%';
        FLUSH PRIVILEGES;
      EOF"
    restart: "no"

  wordpress:
    image: dhi.io/wordpress:<tag>
    volumes:
      - wordpress-data:/var/www/html
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: 1234
    depends_on:
      db-init:
        condition: service_completed_successfully

  nginx:
    image: dhi.io/nginx:1
    ports:
      - "80:8080"
    volumes:
      - wordpress-data:/var/www/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - wordpress

volumes:
  wordpress-data:
  db_data:
